AWSTemplateFormatVersion: '2010-09-09'
Description: 'NFT Marketplace with AI Generation Infrastructure'

Resources:
  # S3 Bucket for NFT assets and metadata
  NFTAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'nft-ai-assets-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAndS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - s3:PutObject
                  - s3:GetObject
                  - rekognition:DetectLabels
                Resource: '*'

Outputs:
  BucketName:
    Value: !Ref NFTAssetsBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
  LambdaRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaRoleArn'
